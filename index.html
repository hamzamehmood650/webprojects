<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Modern Calculator</title>

<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --btn: #334155;
  --btn-hover: #475569;
  --accent: #38bdf8;
  --danger: #ef4444;
  --text: #e2e8f0;
}

* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: var(--text);
}

.calculator {
  width: 340px;
  background: var(--panel);
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.display {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  text-align: right;
  margin-bottom: 10px;
  overflow-x: auto;
}

#historyPreview {
  font-size: 12px;
  color: #94a3b8;
}

#display {
  font-size: 28px;
  word-wrap: break-word;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: var(--btn);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: var(--btn-hover);
}

button:active {
  transform: scale(0.95);
}

.operator {
  background: var(--accent);
  color: #000;
}

.equal {
  background: #22c55e;
  color: #000;
  grid-column: span 2;
}

.clear {
  background: var(--danger);
}

.backspace {
  background: #f59e0b;
}

.history {
  margin-top: 10px;
  max-height: 100px;
  overflow-y: auto;
  font-size: 12px;
  border-top: 1px solid #334155;
  padding-top: 5px;
}

.history div {
  margin-bottom: 3px;
}
</style>
</head>

<body>

<div class="calculator">
  <div class="display">
    <div id="historyPreview"></div>
    <div id="display">0</div>
  </div>

  <div class="buttons">
    <button class="clear">C</button>
    <button class="backspace">⌫</button>
    <button class="operator">%</button>
    <button class="operator">/</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="operator">*</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="operator">-</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="operator">+</button>

    <button>0</button>
    <button>.</button>
    <button class="equal">=</button>
  </div>

  <div class="history" id="history"></div>
</div>

<script>
let display = document.getElementById("display");
let historyPreview = document.getElementById("historyPreview");
let historyDiv = document.getElementById("history");

let currentInput = "";

function updateDisplay() {
  display.textContent = currentInput || "0";
}

function isOperator(char) {
  return ['+', '-', '*', '/', '%'].includes(char);
}

function appendValue(value) {
  if (isOperator(value) && isOperator(currentInput.slice(-1))) return;

  if (value === '.' && currentInput.split(/[\+\-\*\/%]/).pop().includes('.')) return;

  currentInput += value;
  updateDisplay();
}

function clearDisplay() {
  currentInput = "";
  historyPreview.textContent = "";
  updateDisplay();
}

function backspace() {
  currentInput = currentInput.slice(0, -1);
  updateDisplay();
}

function calculate() {
  try {
    if (!currentInput) return;

    let result = eval(currentInput);

    if (!isFinite(result)) throw Error("Invalid");

    historyPreview.textContent = currentInput + " =";
    addToHistory(currentInput + " = " + result);

    currentInput = result.toString();
    updateDisplay();
  } catch {
    display.textContent = "Error";
    currentInput = "";
  }
}

function addToHistory(entry) {
  let div = document.createElement("div");
  div.textContent = entry;
  historyDiv.prepend(div);
}

document.querySelectorAll("button").forEach(btn => {
  btn.addEventListener("click", () => {
    let value = btn.textContent;

    if (value === "C") clearDisplay();
    else if (value === "⌫") backspace();
    else if (value === "=") calculate();
    else appendValue(value);
  });
});

document.addEventListener("keydown", (e) => {
  if (!isNaN(e.key) || ['+', '-', '*', '/', '%', '.'].includes(e.key)) {
    appendValue(e.key);
  } else if (e.key === "Enter") {
    calculate();
  } else if (e.key === "Backspace") {
    backspace();
  } else if (e.key === "Escape") {
    clearDisplay();
  }
});
</script>

</body>
</html>
